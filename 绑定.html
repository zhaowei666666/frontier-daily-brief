<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>绑定手机推送</title>
  <style>
    :root {
      --bg: #eef4f2;
      --paper: #ffffff;
      --ink: #1a2328;
      --accent: #0f6d66;
      --line: rgba(26,35,40,0.1);
      --font-ui: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei UI", "Microsoft YaHei", sans-serif;
      --font-body: "Songti SC", "STSong", "SimSun", serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px 12px 28px;
      color: var(--ink);
      font-family: var(--font-ui);
      background: linear-gradient(180deg, var(--bg) 0%, #f8fbfa 100%);
    }
    main {
      width: min(100%, 720px);
      margin: 0 auto;
      padding: 22px 16px 24px;
      border-radius: 24px;
      background: var(--paper);
      border: 1px solid var(--line);
      box-shadow: 0 18px 48px rgba(26,35,40,0.08);
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(28px, 8vw, 42px);
      line-height: 1.04;
      letter-spacing: -0.04em;
    }
    p {
      margin: 0 0 1em;
      font-size: 15px;
      line-height: 1.85;
    }
    .qr {
      width: min(320px, 100%);
      display: block;
      margin: 18px auto;
      border-radius: 16px;
      border: 1px solid rgba(26,35,40,0.08);
      background: #fff;
    }
    textarea {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid rgba(26,35,40,0.14);
      font: inherit;
      resize: vertical;
    }
    button {
      margin-top: 12px;
      width: fit-content;
      padding: 11px 18px;
      border-radius: 999px;
      border: none;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main>
    <h1>绑定手机推送</h1>
    <p>如果以后需要重新绑定手机，把新的 <code>SPT</code> 粘贴进来即可。当前系统已经启用推送，这个页面主要作为备用入口保留。</p>
    <img class="qr" src="https://wxpusher.zjiecode.com/api/qrcode/RwjGLMOPTYp35zSYQr0HxbCPrV9eU0wKVBXU1D5VVtya0cQXEJWPjqBdW3gKLifS.jpg" alt="WxPusher 绑定二维码">
    <form method="post" action="保存推送.php">
      <textarea name="spt" placeholder="把新的 SPT 粘贴到这里"></textarea>
      <button type="submit">保存新的 SPT</button>
    </form>
  </main>
</body>
</html>
